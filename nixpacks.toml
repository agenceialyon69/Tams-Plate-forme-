# pnpm fourni par nixPkgs → disponible sur le PATH dans TOUTES les phases
# (install + build). `npm install -g pnpm` ne marchait pas (bin global absent du
# PATH → "pnpm: command not found").
[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "BASE_PATH=/ PORT=3000 NODE_ENV=production pnpm --filter @workspace/tams run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "NODE_ENV=production node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
