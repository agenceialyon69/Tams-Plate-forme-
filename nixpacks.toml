[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
# Version exacte = même que celle qui a généré le lockfile (pnpm 10.34.4)
cmds = ["npm install -g pnpm@10.34.4 && pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  # 1. Compiler les déclarations TypeScript des libs partagées
  "pnpm run typecheck:libs",
  # 2. Build frontend Vite
  "BASE_PATH=/ PORT=3000 NODE_ENV=production pnpm --filter @workspace/tams run build",
  # 3. Bundle backend via esbuild
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
