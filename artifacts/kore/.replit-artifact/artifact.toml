kind = "web"
  previewPath = "/"
  title = "TAMS"
  version = "1.0.0"
  id = "artifacts/kore"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 25268

  [services.development]
  run = "pnpm --filter @workspace/kore run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/kore", "run", "build" ]
  publicDir = "artifacts/kore/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "25268"
  BASE_PATH = "/"
  