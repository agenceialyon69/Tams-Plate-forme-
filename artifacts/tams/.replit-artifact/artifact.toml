kind = "web"
previewPath = "/"
title = "TAMS AI Operating System"
version = "1.0.0"
id = "artifacts/tams"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24695

[services.development]
run = "pnpm --filter @workspace/tams run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tams", "run", "build" ]
publicDir = "artifacts/tams/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24695"
BASE_PATH = "/"
