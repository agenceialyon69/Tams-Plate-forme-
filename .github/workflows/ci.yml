name: CI — invariants, build & smoke (garde-fou déploiement)

# Garde-fou multi-agents : Bolt, Replit et Claude poussent tous sur `main`.
# (1) VÉRIFIE que les invariants ne sont pas révertés, (2) build, (3) smoke test.
# Couplée au réglage Railway « Wait for CI to succeed before deploying », un
# commit qui casse/réverte NE DÉPLOIE PAS. NE PAS SUPPRIMER CE FICHIER.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Garde des invariants (voir /AGENTS.md — ne pas réverter)
        run: |
          fail=0
          # grep -F -- : motif littéral + fin des options, donc un motif qui
          # commence par '-' (ex: --no-frozen-lockfile) est traité correctement.
          need() { grep -qF -- "$2" "$1" 2>/dev/null && echo "✅ $3" || { echo "❌ $3 ($1)"; fail=1; }; }
          need railway.toml 'builder = "NIXPACKS"' "railway.toml force Nixpacks"
          need railway.toml 'watchPatterns' "railway.toml watchPatterns"
          need nixpacks.toml '"pnpm"' "nixpacks fournit pnpm via nixPkgs"
          need nixpacks.toml '--no-frozen-lockfile' "install --no-frozen-lockfile"
          need package.json '"packageManager"' "packageManager épinglé"
          [ ! -f postcss.config.js ] && echo "✅ pas de postcss.config.js v3" || { echo "❌ postcss.config.js v3 (page blanche)"; fail=1; }
          need artifacts/tams/src/index.css '@import "tailwindcss"' "Tailwind v4"
          need artifacts/api-server/src/index.ts 'ensureSchema' "ensureSchema au boot"
          if grep -q 'if (process.env.NODE_ENV === "production") {' artifacts/api-server/src/app.ts 2>/dev/null; then echo "❌ app.ts gate NODE_ENV (Cannot GET /)"; fail=1; else echo "✅ app.ts sert le frontend sans gate"; fi
          if grep -rl "total, limit, offset" artifacts/api-server/src/routes/ >/dev/null 2>&1; then echo "❌ endpoint liste {data,total} (écran noir .map)"; fail=1; else echo "✅ endpoints liste = tableaux"; fi
          # Free-first : aucune réintroduction du SDK propriétaire `openai`. Tout
          # passe par lib/ai.ts (fetch, OpenAI-compatible, fournisseurs gratuits).
          if grep -rnE "from \"openai\"|from 'openai'|import\(['\"]openai['\"]\)|require\(['\"]openai['\"]\)" artifacts/api-server/src >/dev/null 2>&1; then echo "❌ SDK openai réintroduit (free-first only — voir lib/ai.ts)"; fail=1; else echo "✅ pas de SDK openai (free-first)"; fi
          need artifacts/tams/src/pages/chat.tsx "/api/kernel/route-intent" "Chat route via Kernel"
          need artifacts/tams/src/pages/chat.tsx "/api/studio/orchestrate" "Chat route vidéo via Studio"
          need artifacts/tams/src/pages/chat.tsx "La génération vidéo réelle n’est pas encore connectée" "limitation vidéo honnête"
          need artifacts/tams/src/pages/chat.tsx "SHOT LIST" "Chat affiche shot list"
          need artifacts/tams/src/pages/chat.tsx "CAPTIONS" "Chat affiche captions"
          need artifacts/tams/src/pages/studio.tsx "Plan vidéo prêt" "Studio affiche résultat utilisateur"
          need artifacts/tams/src/pages/capabilities.tsx "Action UI" "Capabilities actionnables"
          need artifacts/tams/src/pages/capabilities.tsx "/api/capabilities/execute" "Capabilities appelle l'Action Bus"
          need artifacts/api-server/src/routes/capability-actions.ts "router.post(\"/capabilities/execute\"" "Capability Action Bus montable"
          need artifacts/tams/src/pages/systeme.tsx "/api/version" "Système affiche version"
          need artifacts/api-server/src/routes/index.ts "versionRouter" "route version montée"
          need artifacts/api-server/src/routes/index.ts "capabilityActionsRouter" "Capability Action Bus monté"
          need artifacts/api-server/src/lib/agents.ts "SCAN → RISQUES → PLAN → PATCH PROPOSÉ → TESTS → PR" "Dev Agent read-only utile"
          if grep -q "example.com" artifacts/tams/src/pages/chat.tsx; then echo "❌ faux lien example.com dans Chat"; fail=1; else echo "✅ aucun faux lien Chat"; fi
          # VIS : routes critiques RÉELLEMENT montées (sinon page = 404, ex Workflows).
          for r in workflowsRouter studioVideoRouter studioMusicRouter integrationsRouter selfDevRouter devRuntimeRouter; do
            grep -q "$r" artifacts/api-server/src/routes/index.ts || { echo "❌ route non montée: $r"; fail=1; }
          done
          grep -q '/system/validate' artifacts/api-server/src/routes/system.ts && echo "✅ VIS endpoint présent" || { echo "❌ VIS /system/validate manquant"; fail=1; }
          exit $fail

  build-and-smoke:
    runs-on: ubuntu-latest
    needs: invariants
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tams
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tams
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@10.33.0 --activate
      - run: pnpm install --no-frozen-lockfile --lockfile=false
      - name: Build (comme Railway)
        run: |
          BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/tams run build
          pnpm --filter @workspace/api-server run build
      - name: Vérifier le CSS (anti page blanche)
        run: |
          css=$(ls artifacts/tams/dist/public/assets/*.css | head -1); size=$(wc -c < "$css")
          echo "CSS=$size octets"; [ "$size" -lt 60000 ] && { echo "❌ CSS trop petit"; exit 1; } || echo "✅ CSS sain"
      - run: pnpm run typecheck
      - name: Tests du Development Runtime
        run: pnpm --filter @workspace/scripts test
      - name: Scénario réel Development Runtime
        run: |
          pnpm --filter @workspace/scripts dev-runtime:scenario | tee runtime-report.json
          grep -q '"verdict": "PASS"' runtime-report.json
          test -f .tams/runtime-check.md
          grep -q 'TAMS Development Runtime Check' .tams/runtime-check.md
          grep -q 'diff --git a/.tams/runtime-check.md' runtime-report.json
      - name: Scénarios Chat Runtime A/B/C/D
        env:
          TAMS_DEV_RUNTIME_ENABLED: "true"
        run: |
          pnpm --filter @workspace/scripts dev-runtime:mission2 | tee mission2-report.json
          grep -q '"verdict": "PASS"' mission2-report.json
          test -f docs/runtime-chat-note.md
          grep -q 'pilotable par tâche' docs/runtime-chat-note.md
      - name: Smoke test (démarrage réel + endpoints)
        run: |
          NODE_ENV=production PORT=4000 node ./artifacts/api-server/dist/index.mjs &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:4000/api/healthz >/dev/null && break; sleep 1; done
          # ensureSchema tourne en arrière-plan (liveness != readiness) :
          # attendre que les tables existent avant de tester les endpoints DB.
          for i in $(seq 1 20); do [ "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:4000/api/tasks)" = "200" ] && break; sleep 1; done
          fail=0
          check() { c=$(curl -s -o /dev/null -w '%{http_code}' "$1"); [ "$c" = "$2" ] && echo "✅ $1 $c" || { echo "❌ $1 $c≠$2"; fail=1; }; }
          check http://127.0.0.1:4000/api/healthz 200
          check http://127.0.0.1:4000/api/version 200
          check http://127.0.0.1:4000/ 200
          check http://127.0.0.1:4000/api/agents 200
          check http://127.0.0.1:4000/api/conversations 200
          check http://127.0.0.1:4000/api/tasks 200
          check http://127.0.0.1:4000/api/workflows 200
          check http://127.0.0.1:4000/api/system/validate 200
          readiness_code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:4000/api/system/readiness)
          { [ "$readiness_code" = "200" ] || [ "$readiness_code" = "503" ]; } && echo "✅ readiness $readiness_code" || { echo "❌ readiness $readiness_code"; fail=1; }
          check http://127.0.0.1:4000/api/registry/status 200
          check http://127.0.0.1:4000/api/registry/capabilities 200
          check http://127.0.0.1:4000/api/registry/providers 200
          check http://127.0.0.1:4000/api/chat/capabilities 200
          version=$(curl -sf http://127.0.0.1:4000/api/version)
          echo "$version" | grep -q '"app":"TAMS"' || { echo "❌ version app absente"; fail=1; }
          echo "$version" | grep -q '"commit":"unknown"' && { echo "❌ version commit inconnue"; fail=1; } || echo "✅ version commit exposée"
          capabilities=$(curl -sf http://127.0.0.1:4000/api/registry/capabilities)
          echo "$capabilities" | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{const c=JSON.parse(s).capabilities;const v=c.find(x=>x.id==="video.generate");const p=c.find(x=>x.id==="repo.patch");if(v?.status!=="planned"||v?.executableNow!==false||p?.readOnly!==true||p?.executableNow!==false)process.exit(1)})' || { echo "❌ vérité opérationnelle Capabilities"; fail=1; }
          studio=$(curl -sf -X POST -H 'Content-Type: application/json' -d '{"objective":"Vidéo TikTok activewear","targetPlatform":"tiktok","format":"short_video"}' http://127.0.0.1:4000/api/studio/orchestrate)
          echo "$studio" | grep -q '"scriptPlan"' || { echo "❌ Studio sans script"; fail=1; }
          echo "$studio" | grep -q '"storyboardPlan"' || { echo "❌ Studio sans storyboard"; fail=1; }
          echo "$studio" | grep -qi 'planned\|not yet connected' || { echo "❌ Studio sans limitation honnête"; fail=1; }
          echo "$studio" | grep -q 'example.com' && { echo "❌ Studio retourne un faux lien"; fail=1; } || echo "✅ Studio sans faux lien"
          action=$(curl -sf -X POST -H 'Content-Type: application/json' -d '{"capabilityId":"studio.script.generate","input":"Vidéo TikTok activewear"}' http://127.0.0.1:4000/api/capabilities/execute)
          echo "$action" | grep -q '"status":"success"' || { echo "❌ Action Bus studio script non success"; fail=1; }
          echo "$action" | grep -qi 'SCRIPT' || { echo "❌ Action Bus script absent"; fail=1; }
          image=$(curl -sf -X POST -H 'Content-Type: application/json' -d '{"capabilityId":"image.generate","input":"activewear premium"}' http://127.0.0.1:4000/api/capabilities/execute)
          echo "$image" | grep -q '"type":"image"' || { echo "❌ Action Bus image sans artifact image"; fail=1; }
          echo "$image" | grep -q 'pollinations' || { echo "❌ Action Bus image sans Pollinations"; fail=1; }
          agents=$(curl -sf -X POST -H 'Content-Type: application/json' -d '{"task":"Génère une vidéo TikTok pour mon produit activewear et donne-moi le fichier à télécharger."}' http://127.0.0.1:4000/api/agents/orchestrate)
          echo "$agents" | grep -q 'Planification IA indisponible' && { echo "❌ fallback Agents insuffisant"; fail=1; } || echo "✅ fallback Agents utile"
          echo "$agents" | grep -q 'example.com' && { echo "❌ faux lien Agents"; fail=1; } || echo "✅ aucun faux lien Agents"
          echo "$agents" | grep -qi 'SCRIPT' || { echo "❌ script Agents absent"; fail=1; }
          echo "$agents" | grep -qi 'STORYBOARD' || { echo "❌ storyboard Agents absent"; fail=1; }
          echo "$agents" | grep -qi 'KLING / RUNWAY / VEO' || { echo "❌ prompt vidéo externe absent"; fail=1; }
          echo "$agents" | grep -q 'La génération vidéo réelle n’est pas encore connectée' || { echo "❌ limitation honnête absente"; fail=1; }
          devagent=$(curl -sf -X POST -H 'Content-Type: application/json' -d '{"task":"Analyse mon repo et propose les corrections à faire."}' http://127.0.0.1:4000/api/agents/orchestrate)
          echo "$devagent" | grep -q 'SCAN → RISQUES → PLAN → PATCH PROPOSÉ → TESTS → PR' || { echo "❌ Dev Agent plan absent"; fail=1; }
          echo "$devagent" | grep -qi 'mode plan uniquement' || { echo "❌ Dev Agent limite absente"; fail=1; }
          [ "$(curl -s http://127.0.0.1:4000/api/tasks | head -c1)" = "[" ] && echo "✅ tasks tableau" || { echo "❌ tasks pas tableau"; fail=1; }
          exit $fail
