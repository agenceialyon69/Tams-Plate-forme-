name: CI — build & smoke (garde-fou déploiement)

# Garde-fou multi-agents : Bolt, Replit et Claude poussent tous sur `main`.
# Cette CI valide CHAQUE push (build + démarrage réel + endpoints critiques).
# Couplée au réglage Railway « Wait for CI to succeed before deploying »,
# un commit cassé ne déploie JAMAIS : la dernière version verte reste en ligne.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tams
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tams

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # pnpm épinglé sur la version du lockfile (corepack lit packageManager).
      - name: Activer pnpm
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - name: Installer (comme Railway)
        run: pnpm install --no-frozen-lockfile

      - name: Build (comme Railway)
        run: |
          BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/tams run build
          pnpm --filter @workspace/api-server run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Smoke test (démarrage réel + endpoints critiques)
        run: |
          NODE_ENV=production PORT=4000 node ./artifacts/api-server/dist/index.mjs &
          SRV=$!
          # Attendre le boot
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4000/api/healthz >/dev/null; then break; fi
            sleep 1
          done
          fail=0
          check() {
            code=$(curl -s -o /dev/null -w '%{http_code}' "$1")
            if [ "$code" != "$2" ]; then echo "❌ $1 → $code (attendu $2)"; fail=1; else echo "✅ $1 → $code"; fi
          }
          check http://127.0.0.1:4000/api/healthz 200
          check http://127.0.0.1:4000/ 200                         # frontend servi (pas "Cannot GET /")
          check http://127.0.0.1:4000/api/agents 200               # agents montés
          check http://127.0.0.1:4000/api/conversations 200        # chat (pas de double-préfixe)
          check http://127.0.0.1:4000/api/tasks 200
          # Vérifier que les endpoints liste renvoient un TABLEAU (sinon pages noires)
          shape=$(curl -s http://127.0.0.1:4000/api/tasks | head -c 1)
          if [ "$shape" != "[" ]; then echo "❌ /api/tasks ne renvoie pas un tableau"; fail=1; else echo "✅ /api/tasks est un tableau"; fi
          kill $SRV 2>/dev/null || true
          exit $fail
