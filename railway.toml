# Force le builder NIXPACKS (sinon Railway utilise Railpack par défaut, qui lance
# `pnpm install --frozen-lockfile --prefer-offline` en IGNORANT ce nixpacks.toml
# → échec ERR_PNPM_LOCKFILE_CONFIG_MISMATCH). Nixpacks lit nixpacks.toml et
# utilise `--no-frozen-lockfile` : immunisé contre toute dérive de lockfile.
[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
