[build]
builder = "nixpacks"
# Single-service: build BOTH the web app and the API. The API then serves the
# web app from the same origin at runtime (one URL, no CORS).
buildCommand = "pnpm install && PORT=8080 BASE_PATH=/ pnpm --filter @workspace/kore run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

[deploy.envVars]
PORT = "8080"
NODE_ENV = "production"
BASE_PATH = "/"
