[build]
builder = "nixpacks"
# Install is handled by nixpacks.toml (non-frozen). Here we only build BOTH the
# web app and the API; the API serves the web app from the same origin.
buildCommand = "PORT=8080 BASE_PATH=/ pnpm --filter @workspace/kore run build && pnpm --filter @workspace/api-server run build && CI=true pnpm prune --prod"

[deploy]
startCommand = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 120
restartPolicyType = "on_failure"

[deploy.envVars]
PORT = "8080"
NODE_ENV = "production"
BASE_PATH = "/"
