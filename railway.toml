[build]
builder = "nixpacks"
buildCommand = "chmod +x scripts/railway-start.sh && PORT=8080 BASE_PATH=/ pnpm --filter @workspace/kore run build && pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/db run push && CI=true pnpm prune --prod"

[deploy]
startCommand = "sh scripts/railway-start.sh"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 120
restartPolicyType = "on_failure"

[deploy.envVars]
PORT = "8080"
NODE_ENV = "production"
BASE_PATH = "/"
