# Source de vérité déploiement (config-as-code). NE PAS RÉVERTER (/AGENTS.md).
# Auto-réparé par .github/workflows/guardian.yml si modifié.
[build]
builder = "NIXPACKS"
buildCommand = "BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/tams run build && pnpm --filter @workspace/api-server run build"
watchPatterns = ["**"]

[deploy]
startCommand = "NODE_ENV=production node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
